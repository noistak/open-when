<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открой, когда…</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

  <header class="header">
    <h1>Открой, когда…</h1>
    <p class="subtitle">8 маленьких моментов для тебя</p>
  </header>

  <main class="cards">

    <div class="card special" data-id="8">
      <img src="img/march8.png" alt="" width="50">
      <p class="text-march8">Открой сегодня</p>
    </div>

    <div class="card" data-id="1">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда тебе грустно</p>
    </div>

    <div class="card" data-id="2">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда тебе одиноко</p>
    </div>

    <div class="card" data-id="3">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда не можешь уснуть</p>
    </div>

    <div class="card" data-id="4">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда вспоминаешь нас</p>
    </div>

    <div class="card" data-id="5">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда хочешь улыбнуться</p>
    </div>

    <div class="card" data-id="6">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда у тебя тяжёлый день</p>
    </div>

    <div class="card" data-id="7">
      <img src="img/letter.png" alt="" width="50">
      <p>Когда хочешь почувствовать, как ты мне дорога</p>
    </div>

  </main>
</div>


<!-- МОДАЛЬНОЕ ОКНО -->

<div class="modal" id="modal">
  <div class="letter">
      <button class="close">×</button>
    <div class="letter-content">
        <h2 id="letterTitle"></h2>
        <p id="letterText"></p>
        <img id="letterImg">
        <button id="actionBtn" class="action-btn"></button>
        <div id="actionResult" class="action-result"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
