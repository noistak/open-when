<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открой, когда…</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<header class="header">
<h1>Открой, когда…</h1>
<p class="subtitle">8 маленьких моментов для тебя</p>
</header>


<main class="cards">

<div class="card" data-id="1">
<div class="envelope"></div>
<p>Когда грустно</p>
</div>

<div class="card" data-id="2">
<div class="envelope"></div>
<p>Когда скучаешь</p>
</div>

<div class="card" data-id="3">
<div class="envelope"></div>
<p>Когда сомневаешься</p>
</div>

<div class="card" data-id="4">
<div class="envelope"></div>
<p>Когда не спится</p>
</div>

<div class="card" data-id="5">
<div class="envelope"></div>
<p>Когда вспоминаешь нас</p>
</div>

<div class="card" data-id="6">
<div class="envelope"></div>
<p>Когда хочешь улыбнуться</p>
</div>

<div class="card" data-id="7">
<div class="envelope"></div>
<p>Когда злишься</p>
</div>

<div class="card special" data-id="8">
<div class="envelope"></div>
<p>Открой сегодня</p>
</div>

</main>

</div>


<!-- МОДАЛЬНОЕ ОКНО -->

<div class="modal" id="modal">

<div class="letter">

<button class="close">×</button>

<div class="letter-content">

<h2 id="letterTitle"></h2>

<p id="letterText"></p>

<img id="letterImg">

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
